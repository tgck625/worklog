<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支払い明細</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e; --ink-mid: #48484a; --ink-soft: #8e8e93; --ink-faint: #c7c7cc;
    --surface: #ffffff; --surface-2: #f2f2f7; --surface-3: #e5e5ea;
    --accent: #1a6bbf; --accent-light: #e8f1fb;
    --green-light: #e8f8ed; --green-dark: #1e7e34;
    --red-light: #fff0ef; --red-dark: #c0392b;
    --yellow-light: #fff8ec; --purple: #5856d6; --purple-light: #f0f0ff;
    --radius: 12px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--surface-2); color: var(--ink); font-size: 14px; min-height: 100vh; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }
  .page-header {
    background: var(--surface); border-radius: var(--radius); border: 1px solid var(--surface-3);
    padding: 20px 24px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .av { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; flex-shrink: 0; }
  .staff-name { font-size: 20px; font-weight: 500; }
  .staff-rank { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .totals { display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
  .total-item { text-align: right; }
  .total-label { font-size: 10px; color: var(--ink-soft); margin-bottom: 2px; }
  .total-value { font-size: 18px; font-weight: 500; }
  .total-value.accent { color: var(--accent); font-size: 22px; }
  .divider { border-left: 1px solid var(--surface-3); padding-left: 20px; }
  .btn { padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; border: 1px solid var(--surface-3); background: var(--surface); color: var(--ink); font-family: inherit; transition: all 0.12s; font-weight: 400; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #155a9e; }
  .card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--surface-3); margin-bottom: 16px; overflow: hidden; }
  .month-header { font-size: 12px; font-weight: 500; color: var(--ink-soft); padding: 10px 16px; background: var(--surface-2); border-bottom: 1px solid var(--surface-3); display: flex; align-items: center; justify-content: space-between; }
  .month-total { font-size: 13px; font-weight: 500; color: var(--accent); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; font-weight: 500; font-size: 11px; color: var(--ink-soft); border-bottom: 1px solid var(--surface-3); white-space: nowrap; }
  td { padding: 9px 12px; border-bottom: 1px solid var(--surface-3); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  tfoot td { background: var(--surface-2); font-size: 12px; color: var(--ink-soft); }
  tfoot tr:hover td { background: var(--surface-2); }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-green  { background: var(--green-light);  color: var(--green-dark); }
  .badge-amber  { background: var(--yellow-light); color: #7d4a00; }
  .badge-blue   { background: var(--accent-light); color: var(--accent); }
  .badge-red    { background: var(--red-light);    color: var(--red-dark); }
  .badge-gray   { background: var(--surface-3);    color: var(--ink-soft); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  .empty { text-align: center; padding: 48px 16px; color: var(--ink-soft); font-size: 13px; }
  .error-box { background: var(--red-light); border: 1px solid var(--red-dark); border-radius: var(--radius); padding: 24px; margin-top: 40px; text-align: center; color: var(--red-dark); line-height: 1.8; }
  @media print {
    body { background: #fff; }
    .wrap { padding: 0; max-width: none; }
    .print-hide { display: none; }
    .card { border-radius: 0; border-left: none; border-right: none; margin-bottom: 0; }
  }
  @media (max-width: 600px) {
    .page-header { flex-direction: column; align-items: flex-start; }
    .divider { border-left: none; border-top: 1px solid var(--surface-3); padding-left: 0; padding-top: 12px; width: 100%; }
  }
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>
<script>
function render() {
  var root = document.getElementById('root');
  var params = new URLSearchParams(location.search);
  var encoded = params.get('d');

  if (!encoded) {
    root.innerHTML = '<div class="error-box">URLが正しくありません。<br>支払い管理ページからURLをコピーして開いてください。</div>';
    return;
  }

  var data;
  try {
    data = JSON.parse(decodeURIComponent(escape(atob(encoded))));
  } catch(e) {
    root.innerHTML = '<div class="error-box">データの読み込みに失敗しました。<br>支払い管理ページから最新のURLを取得してください。</div>';
    return;
  }

  document.title = '支払い明細 - ' + data.name;

  var monthBlocks = (data.months || []).map(function(m) {
    var parts = m.month.split('-');
    var monthLabel = parts[0] + '年' + parseInt(parts[1]) + '月';
    var mPay = m.events.reduce(function(s, e) { return s + e.pay; }, 0);
    var mTotal = mPay + m.transport;

    var rows = m.events.map(function(e) {
      var roleCell = e.role === 'leader'
        ? '<span class="badge badge-purple" style="font-size:10px">リーダー</span>'
        : '<span class="badge badge-blue" style="font-size:10px">スタッフ</span>';
      var payCell = e.pay === 0 ? '<span style="color:var(--red-dark)">⚠ 未設定</span>' : '¥' + e.pay.toLocaleString();
      var timeCell = e.op.toFixed(1) + 'h' + (e.study ? '+' + e.study + 'h' : '');
      return '<tr>'
        + '<td style="white-space:nowrap;font-weight:500">' + e.date + '</td>'
        + '<td style="font-size:12px;color:var(--ink-soft);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + e.venue + '</td>'
        + '<td><span class="badge ' + e.catColor + '" style="font-size:10px">' + e.cat + '</span></td>'
        + '<td style="font-size:12px;text-align:center">' + timeCell + '</td>'
        + '<td style="text-align:center">' + roleCell + '</td>'
        + '<td style="text-align:right;font-weight:500">' + payCell + '</td>'
        + '</tr>';
    }).join('');

    return '<div class="card">'
      + '<div class="month-header">'
      + '<span>' + monthLabel + '\u3000<span style="color:var(--ink-faint);font-weight:400">' + m.events.length + '件 \uff0f ' + m.dist + 'km</span></span>'
      + '<span class="month-total">\uffe5' + mTotal.toLocaleString() + '</span>'
      + '</div>'
      + '<table>'
      + '<thead><tr><th>日付</th><th>会場</th><th>カテゴリ</th><th style="text-align:center">時間</th><th style="text-align:center">役割</th><th style="text-align:right">給与</th></tr></thead>'
      + '<tbody>' + rows + '</tbody>'
      + '<tfoot><tr>'
      + '<td colspan="4" style="padding:8px 12px">交通費（' + m.dist + 'km）</td>'
      + '<td style="text-align:right;padding:8px 12px">\uffe5' + m.transport.toLocaleString() + '</td>'
      + '<td style="text-align:right;font-weight:500;padding:8px 12px;color:var(--accent)">\uffe5' + mTotal.toLocaleString() + '</td>'
      + '</tr></tfoot>'
      + '</table></div>';
  }).join('');

  var gt = data.totalPay + data.totalTransport;

  root.innerHTML = '<div class="page-header">'
    + '<div class="header-left">'
    + '<div class="av">' + data.name[0] + '</div>'
    + '<div><div class="staff-name">' + data.name + '</div><div class="staff-rank">' + (data.rankLabel || '').trim() + '</div></div>'
    + '</div>'
    + '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">'
    + '<div class="totals">'
    + '<div class="total-item"><div class="total-label">給与累計</div><div class="total-value">\uffe5' + data.totalPay.toLocaleString() + '</div></div>'
    + '<div class="total-item"><div class="total-label">交通費累計</div><div class="total-value">\uffe5' + data.totalTransport.toLocaleString() + '</div></div>'
    + '<div class="total-item divider"><div class="total-label">合計</div><div class="total-value accent">\uffe5' + gt.toLocaleString() + '</div></div>'
    + '</div>'
    + '<div class="print-hide"><button class="btn btn-primary" onclick="window.print()">\ud83d\udda8 印刷</button></div>'
    + '</div>'
    + '</div>'
    + (data.months.length === 0
      ? '<div class="card"><div class="empty">稼働履歴がありません</div></div>'
      : monthBlocks);
}
render();
</script>
</body>
</html>
