<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支払い明細</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e;
    --ink-mid: #48484a;
    --ink-soft: #8e8e93;
    --ink-faint: #c7c7cc;
    --surface: #ffffff;
    --surface-2: #f2f2f7;
    --surface-3: #e5e5ea;
    --accent: #1a6bbf;
    --accent-light: #e8f1fb;
    --green: #34c759;
    --green-light: #e8f8ed;
    --green-dark: #1e7e34;
    --red: #ff3b30;
    --red-light: #fff0ef;
    --red-dark: #c0392b;
    --yellow: #ff9500;
    --yellow-light: #fff8ec;
    --purple: #5856d6;
    --purple-light: #f0f0ff;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--surface-2);
    color: var(--ink);
    font-size: 14px;
    min-height: 100vh;
  }
  .page-wrap { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

  /* header */
  .page-header {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--surface-3);
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .av {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 500; flex-shrink: 0;
  }
  .staff-name { font-size: 20px; font-weight: 500; }
  .staff-rank { font-size: 12px; color: var(--ink-soft); margin-top: 3px; }
  .totals { display: flex; gap: 20px; flex-wrap: wrap; }
  .total-item { text-align: right; }
  .total-label { font-size: 10px; color: var(--ink-soft); margin-bottom: 2px; }
  .total-value { font-size: 18px; font-weight: 500; }
  .total-value.accent { color: var(--accent); font-size: 22px; }
  .divider { border-left: 1px solid var(--surface-3); padding-left: 20px; }

  /* actions */
  .actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 7px 14px; border-radius: var(--radius-sm); font-size: 12px;
    cursor: pointer; border: 1px solid var(--surface-3);
    background: var(--surface); color: var(--ink);
    font-family: inherit; transition: all 0.12s; font-weight: 400; text-decoration: none;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .btn:hover { background: var(--surface-2); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #155a9e; }

  /* card */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1px solid var(--surface-3);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .month-label {
    font-size: 12px; font-weight: 500; color: var(--ink-soft);
    padding: 10px 16px 8px;
    background: var(--surface-2); border-bottom: 1px solid var(--surface-3);
    display: flex; align-items: center; justify-content: space-between;
  }
  .month-subtotal { font-size: 13px; font-weight: 500; color: var(--accent); }

  /* table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 8px 12px; font-weight: 500;
    font-size: 11px; color: var(--ink-soft);
    border-bottom: 1px solid var(--surface-3); white-space: nowrap;
  }
  td { padding: 9px 12px; border-bottom: 1px solid var(--surface-3); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  tfoot tr:hover td { background: var(--surface-2) !important; }
  tfoot td { background: var(--surface-2); font-size: 12px; color: var(--ink-soft); }

  /* badge */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-green  { background: var(--green-light);  color: var(--green-dark); }
  .badge-amber  { background: var(--yellow-light); color: #7d4a00; }
  .badge-blue   { background: var(--accent-light); color: var(--accent); }
  .badge-red    { background: var(--red-light);    color: var(--red-dark); }
  .badge-gray   { background: var(--surface-3);    color: var(--ink-soft); }
  .badge-purple { background: var(--purple-light); color: var(--purple); }

  /* warn */
  .warn { color: var(--red-dark); }

  /* empty */
  .empty { text-align: center; padding: 48px 16px; color: var(--ink-soft); font-size: 13px; }

  /* error */
  .error-box {
    background: var(--red-light); border: 1px solid var(--red);
    border-radius: var(--radius); padding: 20px 24px; margin-top: 40px;
    text-align: center; color: var(--red-dark);
  }

  /* print */
  @media print {
    body { background: #fff; }
    .page-wrap { padding: 0; max-width: none; }
    .actions { display: none; }
    .page-header { border: none; padding: 12px 0; margin-bottom: 12px; }
    .card { border-radius: 0; border-left: none; border-right: none; margin-bottom: 0; }
  }
  @media (max-width: 600px) {
    .page-header { flex-direction: column; align-items: flex-start; }
    .totals { gap: 12px; }
    .total-item { text-align: left; }
    .divider { border-left: none; border-top: 1px solid var(--surface-3); padding-left: 0; padding-top: 12px; width: 100%; }
  }
</style>
</head>
<body>
<div class="page-wrap">
  <div id="root"></div>
</div>

<script>
const SK = {
  events: 'staff_mgmt_events',
  staffs: 'staff_mgmt_staffs',
  venues: 'staff_mgmt_venues',
  cats:   'staff_mgmt_categories',
  ranks:  'staff_mgmt_ranks',
};

function load(key, def) {
  try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; }
}

const TRANSPORT_TABLE = [
  [0,5,0],[5,10,200],[10,15,300],[15,20,400],[20,25,500],
  [25,30,600],[30,35,700],[35,40,800],[40,45,900],[45,50,1000],
  [50,55,1100],[55,60,1200],[60,65,1300],[65,70,1400],[70,75,1500],
  [75,80,1600],[80,85,1700],[85,90,1800],[90,95,1900],[95,100,2000],
];
function transportAmt(km) {
  for (const [a,b,c] of TRANSPORT_TABLE) if (km>=a && km<b) return c;
  if (km >= 100) return 2000;
  return 0;
}
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, dL=(lat2-lat1)*Math.PI/180, dN=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function roundHalfHour(h) {
  const floor = Math.floor(h), frac = h - floor;
  if (frac < 0.25) return floor;
  else if (frac < 0.75) return floor + 0.5;
  else return floor + 1;
}
function calcHoursWage(h, rate) {
  if (h <= 8) return h * rate;
  return 8 * rate + (h - 8) * rate * 1.25;
}
function timeToHours(start, end, breakMin) {
  if (!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  return Math.max(0, ((eh*60+em)-(sh*60+sm)-(breakMin||0))/60);
}
function calcHourlyRate(dailyWage, baseStudyH, baseOpH) {
  const denom = baseStudyH + (baseOpH <= 8 ? baseOpH : 8 + 1.25 * (baseOpH - 8));
  if (denom <= 0) return 0;
  return dailyWage / denom;
}
function calcEventHours(ev) {
  if (!ev.opStart||!ev.opEnd) return {opHours:0,studyHours:ev.studyHours||0,totalHours:ev.studyHours||0};
  const [sh,sm]=ev.opStart.split(':').map(Number);
  const [eh,em]=ev.opEnd.split(':').map(Number);
  const opHours=Math.max(0,((eh*60+em)-(sh*60+sm)-(ev.opBreak||0))/60);
  const studyHours=ev.studyHours||0;
  return {opHours,studyHours,totalHours:opHours+studyHours};
}
function calcPay(ev, staffId) {
  const a = ev.staffAssignments.find(x=>x.staffId===staffId);
  if (!a) return {hourly:0,studyPay:0,opPay:0,total:0,dailyWage:0};
  const staffs = load(SK.staffs,[]);
  const cats   = load(SK.cats,[]);
  const ranks  = load(SK.ranks,[]);
  const staff  = staffs.find(s=>s.id===staffId);
  const cat    = cats.find(c=>c.id===ev.categoryId);
  const rank   = ranks.find(r=>r.id===staff?.rankId);
  if (!staff||!cat||!rank) return {hourly:0,studyPay:0,opPay:0,total:0,dailyWage:0};
  const {opHours,studyHours} = calcEventHours(ev);
  if (a.isLeader) {
    const dailyWage = cat.leaderDailyWage || 0;
    const ldrOpStart=cat.ldrOpStart||cat.opStart, ldrOpEnd=cat.ldrOpEnd||cat.opEnd;
    const ldrOpBreak=cat.ldrOpBreak!=null?cat.ldrOpBreak:(cat.opBreak||0);
    const ldrStudy=cat.ldrStudyHours!=null?cat.ldrStudyHours:(cat.studyHours||1);
    const ldrOp=timeToHours(ldrOpStart,ldrOpEnd,ldrOpBreak)||7;
    const hourlyRate=Math.floor(calcHourlyRate(dailyWage,roundHalfHour(ldrStudy),roundHalfHour(ldrOp)));
    return {hourly:hourlyRate,studyPay:0,opPay:dailyWage,total:dailyWage,dailyWage,missingWage:dailyWage===0,isLeader:true};
  }
  const dailyWage=(cat.rankWages&&(cat.rankWages[rank.id]||cat.rankWages[String(rank.id)]))||0;
  const baseStudy=cat.studyHours||1, baseOp=timeToHours(cat.opStart,cat.opEnd,cat.opBreak||0)||7;
  const baseStudyR=roundHalfHour(baseStudy), baseOpR=roundHalfHour(baseOp);
  const hourly=calcHourlyRate(dailyWage,baseStudyR,baseOpR);
  const actualStudyRaw=studyHours, actualStudyR=roundHalfHour(actualStudyRaw), actualOpR=roundHalfHour(opHours);
  if (actualStudyR===baseStudyR && actualOpR===baseOpR) {
    return {hourly:Math.floor(hourly),studyPay:0,opPay:dailyWage,total:dailyWage,dailyWage,missingWage:dailyWage===0,isLeader:false};
  }
  const studyPay=Math.floor(hourly*actualStudyR), opPay=Math.floor(calcHoursWage(actualOpR,hourly));
  return {hourly:Math.floor(hourly),studyPay,opPay,total:studyPay+opPay,dailyWage,missingWage:dailyWage===0,isLeader:false};
}

// ── メイン描画 ──
function render() {
  const root = document.getElementById('root');
  const params = new URLSearchParams(location.search);
  const staffIdRaw = params.get('staffId');
  const staffId = staffIdRaw ? parseInt(staffIdRaw) : null;

  const staffs = load(SK.staffs, []);
  const events = load(SK.events, []);
  const venues = load(SK.venues, []);
  const cats   = load(SK.cats,   []);
  const ranks  = load(SK.ranks,  []);

  if (!staffId) {
    root.innerHTML = `<div class="error-box">URLに staffId が指定されていません。<br>支払い管理ページからアクセスしてください。</div>`;
    return;
  }

  const sel = staffs.find(s => s.id === staffId);
  if (!sel) {
    root.innerHTML = `<div class="error-box">スタッフ（ID: ${staffId}）が見つかりません。</div>`;
    return;
  }

  const rank = ranks.find(r => r.id === sel.rankId);
  document.title = `支払い明細 - ${sel.name}`;

  // 稼働済みイベントを日付順に取得
  const wevs = events
    .filter(e => e.staffAssignments.some(a => a.staffId === sel.id && a.status === 'worked'))
    .slice().sort((a,b) => a.date.localeCompare(b.date));

  // 月別グループ
  const byMonth = {};
  wevs.forEach(e => {
    const m = e.date.slice(0, 7);
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(e);
  });

  let grandPay = 0, grandTransport = 0;

  const monthBlocks = Object.entries(byMonth).sort().map(([month, mes]) => {
    let mPay = 0, mDist = 0;
    const [yr, mo] = month.split('-');
    const monthLabel = `${yr}年${parseInt(mo)}月`;

    const rows = mes.map(e => {
      const v   = venues.find(x => x.id === e.venueId);
      const c   = cats.find(x => x.id === e.categoryId);
      const a   = e.staffAssignments.find(x => x.staffId === sel.id);
      const p   = calcPay(e, sel.id);
      const dist= (v && sel.lat) ? haversine(sel.lat, sel.lng, v.lat, v.lng) : 0;
      const h   = calcEventHours(e);
      mPay  += p.total;
      mDist += dist;
      const displayStudy = a?.isLeader ? (e.ldrStudyHours ?? h.studyHours) : h.studyHours;
      const timeCell = `${h.opHours.toFixed(1)}h${displayStudy ? '+'+displayStudy+'h' : ''}`;
      const roleCell = a?.isLeader
        ? '<span class="badge badge-purple" style="font-size:10px">リーダー</span>'
        : `<span class="badge badge-blue" style="font-size:10px">${rank?.name||''}</span>`;
      const payCell = p.total === 0
        ? '<span class="warn">⚠ 未設定</span>'
        : '¥' + p.total.toLocaleString();
      return `<tr>
        <td style="white-space:nowrap;font-weight:500">${e.date}</td>
        <td style="font-size:12px;color:var(--ink-soft);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v?.name||'-'}</td>
        <td><span class="badge ${c?.color||'badge-gray'}" style="font-size:10px">${c?.name||''}</span></td>
        <td style="font-size:12px;text-align:center">${timeCell}</td>
        <td style="text-align:center">${roleCell}</td>
        <td style="text-align:right;font-weight:500">${payCell}</td>
      </tr>`;
    }).join('');

    const mTransport = transportAmt(mDist);
    grandPay       += mPay;
    grandTransport += mTransport;
    const mTotal    = mPay + mTransport;

    return `
      <div class="card">
        <div class="month-label">
          <span>${monthLabel}　<span style="color:var(--ink-faint);font-weight:400">${mes.length}件 ／ 距離 ${mDist.toFixed(0)}km</span></span>
          <span class="month-subtotal">¥${mTotal.toLocaleString()}</span>
        </div>
        <table>
          <thead><tr>
            <th>日付</th><th>会場</th><th>カテゴリ</th>
            <th style="text-align:center">時間</th>
            <th style="text-align:center">役割</th>
            <th style="text-align:right">給与</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr>
            <td colspan="4" style="padding:8px 12px">交通費（${mDist.toFixed(0)}km）</td>
            <td style="text-align:right;padding:8px 12px">¥${mTransport.toLocaleString()}</td>
            <td style="text-align:right;font-weight:500;padding:8px 12px;color:var(--accent)">¥${(mPay+mTransport).toLocaleString()}</td>
          </tr></tfoot>
        </table>
      </div>`;
  }).join('');

  const gt = grandPay + grandTransport;
  const emptyHtml = `<div class="card"><div class="empty">稼働履歴がありません</div></div>`;

  root.innerHTML = `
    <div class="page-header">
      <div class="header-left">
        <div class="av">${sel.name[0]}</div>
        <div>
          <div class="staff-name">${sel.name}</div>
          <div class="staff-rank">${rank?.label||''} ${rank?.name||''}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
        <div class="totals">
          <div class="total-item">
            <div class="total-label">給与累計</div>
            <div class="total-value">¥${grandPay.toLocaleString()}</div>
          </div>
          <div class="total-item">
            <div class="total-label">交通費累計</div>
            <div class="total-value">¥${grandTransport.toLocaleString()}</div>
          </div>
          <div class="total-item divider">
            <div class="total-label">合計</div>
            <div class="total-value accent">¥${gt.toLocaleString()}</div>
          </div>
        </div>
        <div class="actions">
          <button class="btn btn-primary" onclick="window.print()">🖨 印刷</button>
          <button class="btn" onclick="history.back()">← 戻る</button>
        </div>
      </div>
    </div>
    ${wevs.length === 0 ? emptyHtml : monthBlocks}`;
}

render();
</script>
</body>
</html>
