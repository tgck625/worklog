<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #f2f2f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: #fff; border-radius: 16px; padding: 32px 28px; max-width: 420px; width: 100%; border: 1px solid #e5e5ea; text-align: center; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  p { font-size: 13px; color: #8e8e93; line-height: 1.7; margin-bottom: 24px; }
  .btn { display: block; width: 100%; padding: 14px; background: #1a6bbf; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #155a9e; }
  .btn:disabled { background: #e5e5ea; color: #8e8e93; cursor: not-allowed; }
  .btn-danger { background: #ff3b30; margin-top: 10px; }
  .btn-danger:hover { background: #c0392b; }
  .result { margin-top: 20px; padding: 14px 16px; border-radius: 10px; font-size: 13px; line-height: 1.7; display: none; }
  .result.ok { background: #e8f8ed; color: #1e7e34; }
  .result.err { background: #fff0ef; color: #c0392b; }
  .back { display: inline-block; margin-top: 20px; font-size: 13px; color: #1a6bbf; text-decoration: none; }

  <button class="btn" id="importBtn" onclick="runImport()">インポート実行（上書き）</button>
  <button class="btn btn-danger" onclick="clearAll()">全データ削除</button>

  <hr style="margin:20px 0;border:none;border-top:1px solid #e5e5ea">
  <p style="font-size:13px;color:#555;margin-bottom:10px">サイト移行・バックアップ用</p>
  <button class="btn" style="background:#34c759" onclick="exportData()">📤 全データをJSONでエクスポート</button>
  <div style="margin-top:10px">
    <label style="display:block;font-size:13px;color:#555;margin-bottom:6px">📥 JSONファイルからインポート（上書き）</label>
    <input type="file" id="jsonFile" accept=".json" style="font-size:13px;width:100%">
    <button class="btn" style="margin-top:8px;background:#555" onclick="importFromJson()">インポート実行</button>
  </div>

  <div class="result" id="result"></div>
  <a href="/eventstaff-shift/" class="back">← トップに戻る</a>

  {id:1, name:"小林知世",  kana:"", rankId:1, address:"", contractSigned:false},
  {id:2, name:"井嶋大智",  kana:"", rankId:1, address:"", contractSigned:false},

function parseAttendance(str) {
  // スペース除去して7文字に
  const chars = str.replace(/\s/g,'').split('');
  const att = {};
  chars.forEach((c, i) => {
    att[i + 1] = c === '○' ? 'ok' : c === '×' ? 'ng' : 'unknown';
  });
  return att;
}

function runImport() {
  const btn = document.getElementById('importBtn');
  const res = document.getElementById('result');
  btn.disabled = true;
  btn.textContent = '処理中...';

  try {
    // スタッフを上書き保存
    localStorage.setItem('staff_mgmt_staffs', JSON.stringify(STAFFS));

    // イベント生成
    const events = RAW_EVENTS.map((row, i) => ({
      id: i + 1,
      name: row[0],
      date: row[1],
      venueId: null,
      categoryId: null,
      requiredCount: 3,
      staffAssignments: [],
      attendance: parseAttendance(row[2]),
      opStart: "10:00",
      opEnd: "17:00",
      opBreak: 0,
      studyHours: 0,
      ldrStudyHours: 0
    }));
    localStorage.setItem('staff_mgmt_events', JSON.stringify(events));

    res.className = 'result ok';
    res.style.display = 'block';
    res.innerHTML = `✅ インポート完了！<br>スタッフ: ${STAFFS.length}名<br>イベント: ${events.length}件`;
    btn.textContent = '完了';
  } catch(e) {
    res.className = 'result err';
    res.style.display = 'block';
    res.textContent = 'エラー: ' + e.message;
    btn.disabled = false;
    btn.textContent = 'インポート実行（上書き）';
  }
}

const ALL_KEYS = ['staff_mgmt_staffs','staff_mgmt_events','staff_mgmt_venues','staff_mgmt_categories','staff_mgmt_schedule_responses','staff_mgmt_ranks','staff_mgmt_pending_registrations'];

function exportData() {
  const data = {};
  ALL_KEYS.forEach(k => {
    const v = localStorage.getItem(k);
    if (v) data[k] = JSON.parse(v);
  });
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `eventstaff_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importFromJson() {
  const file = document.getElementById('jsonFile').files[0];
  const res = document.getElementById('result');
  if (!file) { alert('JSONファイルを選択してください'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, JSON.stringify(v)));
      res.className = 'result ok';
      res.style.display = 'block';
      res.innerHTML = `✅ インポート完了！<br>${Object.keys(data).length}キーを読み込みました`;
    } catch(err) {
      res.className = 'result err';
      res.style.display = 'block';
      res.textContent = 'エラー: ' + err.message;
    }
  };
  reader.readAsText(file);
}

function clearAll() {
  if (!confirm('全データを削除しますか？')) return;
  ALL_KEYS.forEach(k => localStorage.removeItem(k));
  const res = document.getElementById('result');
  res.className = 'result ok';
  res.style.display = 'block';
  res.textContent = '🗑️ 全データを削除しました';
}
